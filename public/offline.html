<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1220" />
    <title>Offline — Stellar Camera Rentals</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family:
          'DM Sans',
          system-ui,
          -apple-system,
          sans-serif;
        background: radial-gradient(120% 120% at 50% 0%, #1e3a5f 0%, #0b1220 55%, #020617 100%);
        color: #e2e8f0;
        padding: 2rem;
        text-align: center;
      }
      .card {
        max-width: 420px;
        padding: 2rem 1.75rem;
        border-radius: 1.25rem;
        background: rgba(15, 23, 42, 0.65);
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(12px);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.35rem;
        font-weight: 600;
      }
      p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.55;
        font-size: 0.95rem;
      }
      .icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 1.25rem;
        border-radius: 1rem;
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        display: grid;
        place-items: center;
        font-size: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" aria-hidden="true">📡</div>
      <h1>You are offline</h1>
      <p>Stellar Camera Rentals needs a connection to sync with your sheet. Reconnect and try again.</p>
    </div>
  </body>
</html>
