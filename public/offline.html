<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#171717" />
    <link rel="icon" type="image/png" href="/steller-logo.png" />
    <title>Offline — STELLER</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family:
          'DM Sans',
          system-ui,
          -apple-system,
          sans-serif;
        background: radial-gradient(120% 120% at 50% 0%, #e0f2fe 0%, #f1f5f9 45%, #e2e8f0 100%);
        color: #0f172a;
        padding: 2rem;
        text-align: center;
      }
      .card {
        max-width: 420px;
        padding: 2rem 1.75rem;
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.35);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(12px);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.35rem;
        font-weight: 600;
      }
      p {
        margin: 0;
        color: #475569;
        line-height: 1.55;
        font-size: 0.95rem;
      }
      .brand {
        display: block;
        width: min(100%, 220px);
        height: auto;
        margin: 0 auto 1.25rem;
        object-fit: contain;
      }
      a {
        color: #0369a1;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="brand" src="/steller-logo.png" width="220" height="72" alt="STELLER" />
      <h1>You are offline</h1>
      <p>STELLER needs a connection to sync with your sheet. Reconnect and try again.</p>
      <p style="margin-top: 1.25rem">
        <a href="/">Open app</a>
      </p>
    </div>
  </body>
</html>
